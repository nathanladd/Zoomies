<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoomies</title>
    <link rel="icon" href="/favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: {
                brand:        '#0078d4',
                'brand-dark': '#106ebe',
                surface:      '#F8F8F8',
                caution:      '#F9A825',
                success:      '#2E7D32',
                danger:       '#E53935',
            }}}
        }
    </script>
    <link rel="stylesheet" href="/static/game/css/styles.css?v=5">
</head>
<body class="bg-surface text-gray-800 min-h-screen">

    <!-- WAITING SCREEN -->
    <div id="screen-waiting" class="screen active">
        <div class="flex items-center justify-center min-h-screen">
        <div class="text-center space-y-6 p-8">
            <h1 class="text-5xl font-bold glow text-brand tracking-wider">RUDI</h1>
            <div class="bg-white rounded-2xl p-8 max-w-md mx-auto space-y-4 border border-gray-200 shadow-md">
                <p class="text-2xl font-semibold">Welcome, <span id="player-name-display" class="text-brand"></span>!</p>
                <div class="animate-pulse text-gray-500">
                    <p class="text-lg">Waiting for quiz to start...</p>
                </div>
            </div>
        </div>
        </div>
    </div>

    <!-- QUESTION SCREEN -->
    <div id="screen-question" class="screen">
        <div class="max-w-4xl mx-auto p-4 space-y-4">
            <!-- Header -->
            <div class="flex justify-between items-center">
                <span id="q-progress" class="text-gray-500 text-lg font-medium"></span>
                <div class="flex items-center gap-4">
                    <span id="q-timer" class="text-2xl font-bold text-caution"></span>
                    <span id="q-points" class="text-2xl font-bold text-success"></span>
                </div>
            </div>

            <!-- Timer Bar -->
            <div class="w-full bg-gray-200 rounded-full h-3 overflow-hidden">
                <div id="timer-bar" class="h-full bg-gradient-to-r from-brand to-success rounded-full transition-all duration-100"></div>
            </div>

            <!-- Question Image -->
            <div id="q-image-container" class="hidden flex justify-center">
                <img id="q-image" class="max-h-64 rounded-xl border border-gray-300" alt="Question image">
            </div>

            <!-- Question Text -->
            <div id="q-text" class="text-xl md:text-2xl text-center font-medium py-4 px-2 text-gray-800"></div>

            <!-- Answer Choices -->
            <div id="choices-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- Populated by JS -->
            </div>

            <!-- Locked-in message -->
            <div id="locked-msg" class="hidden text-center py-4">
                <p class="text-lg text-gray-600 animate-pulse">Answer locked in. Waiting for time to expire...</p>
            </div>
        </div>
    </div>

    <!-- RESULT SCREEN (per question) -->
    <div id="screen-result" class="screen">
        <div class="max-w-2xl mx-auto p-8 text-center space-y-6">
            <p id="q-progress-result" class="text-gray-500 text-lg"></p>

            <div id="result-banner" class="text-4xl font-bold py-4"></div>
            <p id="result-points" class="text-2xl"></p>

            <!-- Show all choices with correct highlighted -->
            <div id="result-choices" class="grid grid-cols-1 md:grid-cols-2 gap-3 max-w-lg mx-auto"></div>

            <div class="bg-white rounded-xl p-4 flex justify-between items-center max-w-lg mx-auto border border-gray-200 shadow-sm">
                <div>
                    <p class="text-sm text-gray-400">Your Score</p>
                    <p id="result-total-score" class="text-2xl font-bold text-brand"></p>
                </div>
                <div>
                    <p class="text-sm text-gray-400">Rank</p>
                    <p id="result-rank" class="text-2xl font-bold text-caution"></p>
                </div>
            </div>

            <p class="text-gray-400 animate-pulse">Waiting for instructor to continue...</p>
        </div>
    </div>

    <!-- FINAL RESULTS SCREEN -->
    <div id="screen-final" class="screen">
        <div class="max-w-2xl mx-auto p-8 text-center space-y-6">
            <h2 class="text-4xl font-bold text-caution">QUIZ COMPLETE!</h2>

            <div>
                <p class="text-gray-400">Your Final Score</p>
                <p id="final-score" class="text-5xl font-bold text-brand"></p>
            </div>

            <p id="final-rank" class="text-3xl font-bold"></p>

            <div class="bg-white rounded-xl p-4 text-left max-w-lg mx-auto border border-gray-200 shadow-sm">
                <h3 class="text-lg font-semibold text-gray-600 mb-3">Leaderboard</h3>
                <div id="final-leaderboard" class="space-y-2"></div>
            </div>

            <button onclick="window.location.href='/'"
                class="mt-4 px-6 py-3 bg-brand hover:bg-brand-dark text-white rounded-xl text-lg font-semibold transition-all">
                Back to Home
            </button>
        </div>
    </div>

    <div id="version-badge"
        class="fixed bottom-2 right-2 text-xs text-gray-400 select-none pointer-events-none z-50"></div>

    <script>
        fetch('/api/version').then(r => r.json()).then(d => {
            document.getElementById('version-badge').textContent = 'v' + d.version;
        }).catch(() => {});
    </script>
    <script src="/static/game/js/game.js?v=4"></script>
</body>
</html>
