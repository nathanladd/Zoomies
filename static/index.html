<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rudi</title>
    <link rel="icon" href="/favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: {
                brand:        '#0078d4',
                'brand-dark': '#106ebe',
                surface:      '#F8F8F8',
                caution:      '#F9A825',
                success:      '#2E7D32',
                danger:       '#E53935',
            }}}
        }
    </script>
    <style>
        body { background-color: #F8F8F8; min-height: 100vh; }
        .glow { text-shadow: 0 0 20px rgba(0, 120, 212, 0.4); }
    </style>
</head>
<body class="text-gray-800 flex items-center justify-center min-h-screen">
    <div class="text-center space-y-6 p-8 max-w-2xl">
        <h1 class="text-6xl font-bold glow text-brand tracking-wider">Zoomies</h1>
        <p class="text-gray-400 text-sm">A classroom quiz game.</p>

        <div id="join-form" class="bg-white rounded-2xl p-8 max-w-md mx-auto space-y-6 shadow-md border border-gray-200">
            <h2 class="text-2xl font-semibold text-gray-800">Join the Quiz</h2>

            <div>
                <input id="player-name" type="text" placeholder="Enter your name"
                    class="w-full px-4 py-3 rounded-xl bg-white border border-gray-300 text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand text-lg"
                    maxlength="30" autocomplete="off">
            </div>

            <div>
                <input id="game-id" type="text" placeholder="Game Code (e.g. K7XQ2M)"
                    class="w-full px-4 py-3 rounded-xl bg-white border border-gray-300 text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand text-lg tracking-widest uppercase"
                    maxlength="6" autocomplete="off" autocorrect="off" spellcheck="false">
            </div>

            <button id="join-btn" onclick="joinGame()"
                class="w-full py-3 px-6 bg-brand hover:bg-brand-dark text-white rounded-xl text-lg font-semibold transition-all duration-200 hover:scale-105 active:scale-95">
                Join Game
            </button>

            <p id="error-msg" class="text-red-600 text-sm hidden"></p>
        </div>
    </div>

    <div id="version-badge"
        class="fixed bottom-2 left-2 text-xs text-gray-400 select-none pointer-events-none"></div>

    <script>
        fetch('/api/version').then(r => r.json()).then(d => {
            document.getElementById('version-badge').textContent = 'v' + d.version;
        }).catch(() => {});

        const nameInput = document.getElementById('player-name');
        const gameInput = document.getElementById('game-id');
        const errorMsg = document.getElementById('error-msg');

        nameInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') joinGame(); });
        gameInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') joinGame(); });
        gameInput.addEventListener('input', () => { gameInput.value = gameInput.value.toUpperCase(); });

        function joinGame() {
            const name = nameInput.value.trim();
            const gameCode = gameInput.value.trim().toUpperCase();

            if (!name) {
                showError('Please enter your name.');
                return;
            }
            if (!gameCode) {
                showError('Please enter the game code.');
                return;
            }
            if (!/^[A-Z0-9]{6}$/.test(gameCode)) {
                showError('Game code must be 6 letters/numbers.');
                return;
            }

            window.location.href = `/play?game=${gameCode}&name=${encodeURIComponent(name)}`;
        }

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.classList.remove('hidden');
            setTimeout(() => errorMsg.classList.add('hidden'), 3000);
        }
    </script>
</body>
</html>
