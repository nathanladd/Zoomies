<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rudi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%); min-height: 100vh; }
        .glow { text-shadow: 0 0 20px rgba(99, 102, 241, 0.5); }
    </style>
</head>
<body class="text-white flex items-center justify-center min-h-screen">
    <div class="text-center space-y-6 p-8 max-w-2xl">
        <h1 class="text-6xl font-bold glow text-indigo-400 tracking-wider">RUDI</h1>
        <p class="italic text-slate-300 text-base leading-relaxed">
            Named for Rudolf Christian Karl Diesel &mdash; the engineer whose spark of an idea still drives us forward.
        </p>
        <p class="text-slate-400 text-sm -mt-4">A classroom quiz game.</p>
        <p class="italic text-amber-400 text-base">
            &ldquo;Do not fear failure, but rather fear not trying at all.&rdquo; &mdash; Rudolf Diesel
        </p>

        <div id="join-form" class="bg-slate-800/80 backdrop-blur rounded-2xl p-8 max-w-md mx-auto space-y-6 shadow-2xl border border-slate-700">
            <h2 class="text-2xl font-semibold">Join the Quiz</h2>

            <div>
                <input id="player-name" type="text" placeholder="Enter your name"
                    class="w-full px-4 py-3 rounded-xl bg-slate-700 border border-slate-600 text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-lg"
                    maxlength="30" autocomplete="off">
            </div>

            <div>
                <input id="game-id" type="number" placeholder="Game Number"
                    class="w-full px-4 py-3 rounded-xl bg-slate-700 border border-slate-600 text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-lg"
                    min="1" autocomplete="off">
            </div>

            <button id="join-btn" onclick="joinGame()"
                class="w-full py-3 px-6 bg-indigo-600 hover:bg-indigo-500 rounded-xl text-lg font-semibold transition-all duration-200 hover:scale-105 active:scale-95">
                Join Game
            </button>

            <p id="error-msg" class="text-red-400 text-sm hidden"></p>
        </div>
    </div>

    <div id="version-badge"
        class="fixed bottom-2 left-2 text-xs text-slate-600 select-none pointer-events-none"></div>

    <script>
        fetch('/api/version').then(r => r.json()).then(d => {
            document.getElementById('version-badge').textContent = 'v' + d.version;
        }).catch(() => {});

        const nameInput = document.getElementById('player-name');
        const gameInput = document.getElementById('game-id');
        const errorMsg = document.getElementById('error-msg');

        nameInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') joinGame(); });
        gameInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') joinGame(); });

        function joinGame() {
            const name = nameInput.value.trim();
            const gameId = gameInput.value.trim();

            if (!name) {
                showError('Please enter your name.');
                return;
            }
            if (!gameId) {
                showError('Please enter the game ID.');
                return;
            }

            window.location.href = `/play?game=${gameId}&name=${encodeURIComponent(name)}`;
        }

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.classList.remove('hidden');
            setTimeout(() => errorMsg.classList.add('hidden'), 3000);
        }
    </script>
</body>
</html>
